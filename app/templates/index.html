<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hero Directory</title>
        <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    </head>
    <body>
        <div class="wrapper">
            <h1 class="title">Super Hero Directory</h1>
            <ul>
                {% for hero_id, hero_data in heroes.items() %}
                    <li>
                        <a href="{{ url_for('get_hero_by_id', hero_id=hero_id) }}">{{ hero_data.name }}</a>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </body>
</html>
